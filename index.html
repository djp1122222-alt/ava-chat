<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Ava AI - Your Assistant</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px;}
        .chat-container{max-width:450px;width:100%;background:white;border-radius:28px;box-shadow:0 20px 60px rgba(0,0,0,0.3);overflow:hidden;height:85vh;max-height:700px;display:flex;flex-direction:column;}
        .chat-header{background:linear-gradient(135deg,#6B46C1,#8B5CF6);padding:20px;text-align:center;color:white;}
        .avatar{width:70px;height:70px;background:white;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 12px;}
        .avatar i{font-size:42px;color:#6B46C1;}
        .chat-header h2{font-size:22px;margin-bottom:4px;}
        .messages{flex:1;overflow-y:auto;padding:20px;background:#F7FAFC;}
        .message{margin-bottom:16px;display:flex;}
        .message.bot{justify-content:flex-start;}
        .message.user{justify-content:flex-end;}
        .message-content{max-width:80%;padding:12px 16px;border-radius:20px;font-size:15px;}
        .bot .message-content{background:white;color:#2D3748;border-bottom-left-radius:4px;}
        .user .message-content{background:#6B46C1;color:white;border-bottom-right-radius:4px;}
        .typing{display:flex;padding:12px 16px;background:white;border-radius:20px;width:fit-content;gap:4px;}
        .typing span{width:8px;height:8px;background:#A0AEC0;border-radius:50%;animation:bounce 1.4s infinite;}
        @keyframes bounce{0%,80%,100%{transform:scale(0);}40%{transform:scale(1);}}
        .input-area{padding:16px 20px;background:white;border-top:1px solid #E2E8F0;display:flex;gap:10px;}
        .input-area input{flex:1;padding:12px 16px;border:2px solid #E2E8F0;border-radius:25px;font-size:15px;outline:none;}
        .input-area input:focus{border-color:#6B46C1;}
        .mic-btn,.send-btn{width:44px;height:44px;border-radius:50%;border:none;font-size:18px;cursor:pointer;}
        .mic-btn{background:#F7FAFC;border:2px solid #E2E8F0;color:#6B46C1;}
        .send-btn{background:#6B46C1;color:white;}
        .recording{background:#FC8181;color:white;}
    </style>
</head>
<body>
<div class="chat-container">
    <div class="chat-header">
        <div class="avatar"><i class="fas fa-user-circle"></i></div>
        <h2>Hi, I'm Ava! 👋</h2>
    </div>
    <div class="messages" id="messages">
        <div class="message bot"><div class="message-content">Hello! I'm Ava. I can help you purchase our AI agent software for £99. What's your first name?</div></div>
    </div>
    <div class="input-area">
        <button class="mic-btn" id="micBtn" onclick="startVoiceInput()"><i class="fas fa-microphone"></i></button>
        <input type="text" id="userInput" placeholder="Type your message..." onkeypress="if(event.key==='Enter')sendMessage()">
        <button class="send-btn" id="sendBtn" onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
    </div>
</div>
<script>
// =============================================
// CONFIGURATION
// =============================================
const YOUR_EMAIL = "djp11122222@gmail.com";  // Where to send chat logs
const STRIPE_LINK = "https://buy.stripe.com/3cI9AUgyv7rF1jr2rVabK1b";

// =============================================
// CHAT STATE
// =============================================
let step = "greeting";
let customerData = {
    firstName: null, lastName: null, email: null, businessName: null,
    industry: null, emailRate: null, phone: null, businessType: null
};
let tempProducts = [];
let tempServices = [];
let tempEmails = [];
let conversationLog = [];  // Stores all messages for email

let recognition = null;
let isRecording = false;

// =============================================
// VOICE RECOGNITION
// =============================================
if ('webkitSpeechRecognition' in window) {
    recognition = new webkitSpeechRecognition();
    recognition.lang = 'en-US';
    recognition.onresult = function(e) {
        document.getElementById('userInput').value = e.results[0][0].transcript;
        sendMessage();
    };
    recognition.onend = function() {
        document.getElementById('micBtn').classList.remove('recording');
        document.getElementById('micBtn').innerHTML = '<i class="fas fa-microphone"></i>';
        isRecording = false;
    };
}

function startVoiceInput() {
    if (!recognition) { alert("Voice not supported on this device"); return; }
    if (isRecording) { recognition.stop(); return; }
    recognition.start();
    document.getElementById('micBtn').classList.add('recording');
    document.getElementById('micBtn').innerHTML = '<i class="fas fa-microphone-slash"></i>';
    isRecording = true;
}

// =============================================
// CHAT FUNCTIONS
// =============================================
function addMessage(text, isUser) {
    let m = document.getElementById('messages');
    let d = document.createElement('div');
    d.className = 'message ' + (isUser ? 'user' : 'bot');
    d.innerHTML = '<div class="message-content">' + text + '</div>';
    m.appendChild(d);
    m.scrollTop = m.scrollHeight;
    
    // Log message
    conversationLog.push({
        speaker: isUser ? "Customer" : "Ava",
        message: text,
        timestamp: new Date().toISOString()
    });
}

function showTyping() {
    let m = document.getElementById('messages');
    let t = document.createElement('div');
    t.className = 'message bot';
    t.id = 'typing';
    t.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';
    m.appendChild(t);
    m.scrollTop = m.scrollHeight;
}

function hideTyping() {
    let t = document.getElementById('typing');
    if (t) t.remove();
}

function sendMessage() {
    let inp = document.getElementById('userInput');
    let msg = inp.value.trim();
    if (!msg) return;
    addMessage(msg, true);
    inp.value = '';
    showTyping();
    setTimeout(() => {
        hideTyping();
        let reply = processMessage(msg.toLowerCase());
        addMessage(reply, false);
    }, 500);
}

// =============================================
// SEND EMAIL WITH CHAT LOG
// =============================================
function sendChatLog() {
    // Format conversation for email
    let logText = "NEW AI AGENT PURCHASE\n";
    logText += "=".repeat(50) + "\n";
    logText += `Customer: ${customerData.firstName} ${customerData.lastName}\n`;
    logText += `Email: ${customerData.email}\n`;
    logText += `Business: ${customerData.businessName}\n`;
    logText += `Industry: ${customerData.industry}\n`;
    logText += `Email Rate: ${customerData.emailRate}\n`;
    logText += `Phone: ${customerData.phone || "Not provided"}\n`;
    logText += `Business Type: ${customerData.businessType}\n`;
    
    if (customerData.businessType === "product") {
        logText += `Products: ${tempProducts.join(", ") || "None"}\n`;
    } else {
        logText += `Services: ${tempServices.join(", ") || "None"}\n`;
    }
    logText += `Extra Emails: ${tempEmails.join(", ") || "None"}\n`;
    logText += "=".repeat(50) + "\n\n";
    logText += "FULL CONVERSATION LOG:\n";
    logText += "=".repeat(50) + "\n";
    
    for (let msg of conversationLog) {
        let time = new Date(msg.timestamp).toLocaleTimeString();
        logText += `[${time}] ${msg.speaker}: ${msg.message}\n`;
    }
    
    // Send via email using a simple mailto (opens email client)
    let subject = encodeURIComponent(`New AI Agent Sale - ${customerData.firstName} ${customerData.lastName}`);
    let body = encodeURIComponent(logText);
    window.location.href = `mailto:${YOUR_EMAIL}?subject=${subject}&body=${body}`;
    
    // Also save to localStorage
    let allData = {
        customer: customerData,
        products: tempProducts,
        services: tempServices,
        extraEmails: tempEmails,
        conversation: conversationLog,
        timestamp: new Date().toISOString()
    };
    localStorage.setItem('avaCustomerData', JSON.stringify(allData));
    
    return "📧 A copy of our conversation has been emailed to our support team. We'll be in touch shortly!";
}

// =============================================
// CONVERSATION FLOW
// =============================================
function processMessage(i) {
    if (i === 'start over') {
        reset();
        return "Let's start over! What's your first name?";
    }
    
    if (i.includes('what is') || i.includes('how much') || i.includes('features')) {
        return "Our AI agent is a Python script that automates customer service, handles emails, scrapes leads, and generates tickets. One-time payment of £99, no subscription. Type 'yes' to buy!";
    }
    
    if (step === "greeting") {
        customerData.firstName = i;
        step = "lastName";
        return "Thank you! What's your last name?";
    }
    
    if (step === "lastName") {
        customerData.lastName = i;
        step = "email";
        return "What's your email address?";
    }
    
    if (step === "email") {
        if (i.includes('@') && i.includes('.')) {
            customerData.email = i;
            step = "businessName";
            return "What's your business name?";
        }
        return "Please enter a valid email address (like name@company.com).";
    }
    
    if (step === "businessName") {
        customerData.businessName = i;
        step = "industry";
        return "What industry? (E-commerce, Healthcare, Education, Retail, SaaS, Consulting, or Other)";
    }
    
    if (step === "industry") {
        customerData.industry = i;
        step = "emailRate";
        return "What's your email sending rate? Example: '10 per hour', '200 per day', or '5 per minute'";
    }
    
    if (step === "emailRate") {
        if (/\d/.test(i) && (i.includes('hour') || i.includes('day') || i.includes('minute'))) {
            customerData.emailRate = i;
            step = "phone";
            return "Phone number? (or type 'skip')";
        }
        return "Please specify with a number and unit. Example: '50 per day' or '10 per hour'";
    }
    
    if (step === "phone") {
        if (i !== 'skip') customerData.phone = i;
        step = "businessType";
        return "Does your business sell products or offer services? (type 'product' or 'service')";
    }
    
    if (step === "businessType") {
        if (i === 'product') {
            customerData.businessType = 'product';
            step = "products";
            return "Great! List your products with prices. Format: ProductName:Price. Type each product, then type 'done' when finished. If no products, type 'none'.";
        } else if (i === 'service') {
            customerData.businessType = 'service';
            step = "services";
            return "Great! List your services. Type each service, then type 'done' when finished. If no services, type 'none'.";
        }
        return "Please type 'product' or 'service'.";
    }
    
    if (step === "products") {
        if (i === 'done' || i === 'none') {
            step = "extraEmails";
            return "Any additional email addresses for your campaign? Type them one per line, or type 'skip' if none.";
        }
        tempProducts.push(i);
        return `Added "${i}". Add another product or type 'done'.`;
    }
    
    if (step === "services") {
        if (i === 'done' || i === 'none') {
            step = "extraEmails";
            return "Any additional email addresses for your campaign? Type them one per line, or type 'skip' if none.";
        }
        tempServices.push(i);
        return `Added "${i}". Add another service or type 'done'.`;
    }
    
    if (step === "extraEmails") {
        if (i === 'skip' || i === 'done') {
            step = "payment";
            return "Ready to pay £99 for your custom AI agent? Type 'yes' for the payment link.";
        }
        tempEmails.push(i);
        return `Added "${i}". Add another email or type 'done'.`;
    }
    
    if (step === "payment" && (i === 'yes' || i === 'y')) {
        // Send email with chat log
        let emailResult = sendChatLog();
        return `🎉 Perfect! Here's your payment link: ${STRIPE_LINK}\n\nAfter payment, we'll email your custom script to ${customerData.email}.\n\n${emailResult}\n\nThank you for choosing Ava! 💜`;
    }
    
    return "Type 'start over' to begin again, or ask me about the software!";
}

function reset() {
    step = "greeting";
    customerData = {
        firstName: null, lastName: null, email: null, businessName: null,
        industry: null, emailRate: null, phone: null, businessType: null
    };
    tempProducts = [];
    tempServices = [];
    tempEmails = [];
    conversationLog = [];
    document.getElementById('messages').innerHTML = '';
    addMessage("Hello! I'm Ava. I can help you purchase our AI agent software for £99. What's your first name?", false);
}

// Event listeners
document.getElementById('sendBtn').onclick = sendMessage;
document.getElementById('micBtn').onclick = startVoiceInput;
</script>
</body>
</html>
